<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoachHub — Career Coaching Dashboard</title>
  <style>
    :root {
      --bg: #f8fafc;
      --sidebar-bg: #0f172a;
      --sidebar-text: #94a3b8;
      --sidebar-active: #3b82f6;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --fg: #1e293b;
      --fg-muted: #64748b;
      --accent: #3b82f6;
      --accent-light: #eff6ff;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 232px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      flex-shrink: 0;
    }
    .sidebar-logo {
      padding: 0 20px 20px;
      border-bottom: 1px solid #1e293b;
      margin-bottom: 12px;
    }
    .sidebar-logo h1 { font-size: 16px; font-weight: 700; color: #f1f5f9; letter-spacing: -.3px; }
    .sidebar-logo p  { font-size: 11px; color: var(--sidebar-text); margin-top: 2px; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px;
      color: var(--sidebar-text);
      cursor: pointer;
      font-size: 14px;
      transition: all .15s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: #1e293b; color: #f1f5f9; }
    .nav-item.active { background: #1e293b; color: #f1f5f9; border-left-color: var(--sidebar-active); }
    .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* ── Main ── */
    .main { flex: 1; overflow-y: auto; padding: 32px; }
    .page { display: none; }
    .page.active { display: block; }

    .page-header { margin-bottom: 28px; }
    .page-header h2 { font-size: 22px; font-weight: 700; letter-spacing: -.4px; }
    .page-header p  { font-size: 14px; color: var(--fg-muted); margin-top: 4px; }

    /* ── Cards ── */
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
    .card-title { font-size: 12px; font-weight: 700; color: var(--fg-muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 14px; }

    /* ── Grid ── */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .g4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; }

    /* ── Metric cards ── */
    .metric-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
    .metric-icon  { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .metric-label { font-size: 11px; font-weight: 700; color: var(--fg-muted); text-transform: uppercase; letter-spacing: .6px; }
    .metric-value { font-size: 32px; font-weight: 700; letter-spacing: -1px; margin: 4px 0 2px; }
    .metric-sub   { font-size: 12px; color: var(--fg-muted); }

    /* ── Badge ── */
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .badge-blue   { background: #dbeafe; color: #1d4ed8; }
    .badge-green  { background: #d1fae5; color: #065f46; }
    .badge-yellow { background: #fef3c7; color: #92400e; }
    .badge-red    { background: #fee2e2; color: #991b1b; }
    .badge-gray   { background: #f1f5f9; color: #475569; }
    .badge-purple { background: #ede9fe; color: #5b21b6; }

    /* ── Progress bar ── */
    .progress-bar  { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-ghost { background: transparent; color: var(--fg-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); color: var(--fg); }

    /* ── Input ── */
    .input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; color: var(--fg); background: #fff; outline: none; width: 100%; }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }

    /* ── Avatar ── */
    .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; flex-shrink: 0; }

    /* ── Coachee list ── */
    .search-bar    { display: flex; gap: 8px; margin-bottom: 20px; }
    .coachee-list  { display: flex; flex-direction: column; gap: 10px; }
    .coachee-card  {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 18px; display: flex; align-items: center; gap: 16px;
      cursor: pointer; box-shadow: var(--shadow); transition: all .15s;
    }
    .coachee-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .coachee-name  { font-size: 15px; font-weight: 600; }
    .coachee-role  { font-size: 12px; color: var(--fg-muted); margin-top: 2px; }
    .coachee-prog  { width: 150px; }
    .prog-label    { display: flex; justify-content: space-between; font-size: 11px; color: var(--fg-muted); margin-bottom: 4px; }

    /* ── Today items ── */
    .today-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .today-row:last-child { border-bottom: none; }
    .today-time { font-size: 12px; font-weight: 700; color: var(--accent); width: 46px; flex-shrink: 0; }

    /* ── Action items ── */
    .action-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .action-row:last-child { border-bottom: none; }
    .chk {
      width: 17px; height: 17px; border: 2px solid var(--border); border-radius: 4px;
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    .chk.done { background: var(--success); border-color: var(--success); }
    .chk.done::after { content:''; width:9px; height:5px; border:2px solid #fff; border-top:none; border-right:none; transform:rotate(-45deg) translateY(-1px); display:block; }
    .action-title-text { flex: 1; font-size: 13px; }
    .action-title-text.done { text-decoration: line-through; color: var(--fg-muted); }

    /* ── Weekly calendar ── */
    .week-nav   { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .week-label { font-size: 15px; font-weight: 600; min-width: 220px; text-align: center; }
    .week-grid  { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .day-col    { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; min-height: 280px; }
    .day-header { text-align: center; margin-bottom: 12px; }
    .day-name   { font-size: 10px; font-weight: 700; color: var(--fg-muted); text-transform: uppercase; letter-spacing: .5px; }
    .day-num    { font-size: 20px; font-weight: 700; margin-top: 3px; }
    .day-col.today .day-num {
      background: var(--accent); color: #fff;
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 3px auto 0; font-size: 13px;
    }
    .ses-chip { background: var(--accent-light); border: 1px solid #bfdbfe; border-radius: 7px; padding: 7px 8px; margin-bottom: 5px; font-size: 11px; cursor: pointer; }
    .ses-chip:hover { background: #dbeafe; }
    .ses-time { font-weight: 700; color: var(--accent); }
    .ses-who  { color: var(--fg); margin-top: 1px; }

    /* ── Pipeline kanban ── */
    .kanban { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; }
    .kanban-col { min-width: 195px; width: 195px; flex-shrink: 0; }
    .kanban-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding: 0 4px; }
    .kanban-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; }
    .kanban-count { background: var(--border); color: var(--fg-muted); border-radius: 99px; font-size: 11px; font-weight: 700; padding: 1px 6px; }
    .drop-zone {
      min-height: 380px; display: flex; flex-direction: column; gap: 8px;
      padding: 8px; border-radius: var(--radius);
      background: #f8fafc; border: 2px dashed transparent; transition: all .15s;
    }
    .drop-zone.drag-over { border-color: var(--accent); background: var(--accent-light); }
    .lead-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 11px 12px; cursor: grab; box-shadow: var(--shadow); transition: box-shadow .15s; user-select: none; }
    .lead-card:hover { box-shadow: var(--shadow-md); }
    .lead-card.dragging { opacity: .45; }
    .lead-name  { font-size: 13px; font-weight: 600; }
    .lead-email { font-size: 11px; color: var(--fg-muted); margin-top: 2px; }
    .lead-notes { font-size: 11px; color: var(--fg-muted); margin-top: 6px; line-height: 1.45; }

    /* ── Profile ── */
    .profile-hdr { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
    .profile-meta h2 { font-size: 22px; font-weight: 700; letter-spacing: -.4px; }
    .profile-meta p  { font-size: 14px; color: var(--fg-muted); margin-top: 3px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--fg-muted); cursor: pointer; margin-bottom: 20px; }
    .back-btn:hover { color: var(--fg); }
    .tab-bar { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
    .tab { padding: 9px 16px; font-size: 13px; font-weight: 600; color: var(--fg-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; }
    .tab:hover { color: var(--fg); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .ses-row { display: flex; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .ses-row:last-child { border-bottom: none; }
    .ses-datebox { width: 44px; text-align: center; flex-shrink: 0; }
    .ses-month { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--fg-muted); }
    .ses-day   { font-size: 22px; font-weight: 700; line-height: 1; }
    .ses-body  { flex: 1; }
    .ses-dur   { font-size: 11px; color: var(--fg-muted); margin-bottom: 4px; }
    .ses-notes { font-size: 13px; line-height: 1.6; margin-bottom: 6px; }
    .ses-next  { font-size: 12px; color: var(--accent); font-weight: 600; }
    .goal-row  { display: flex; gap: 8px; align-items: flex-start; padding: 5px 0; font-size: 13px; }
    .goal-dot  { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 5px; }

    /* ── Misc ── */
    .section-gap { margin-bottom: 20px; }
    .empty { text-align: center; padding: 36px; color: var(--fg-muted); font-size: 13px; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<!-- ── Sidebar ───────────────────────────────────────────────────────────── -->
<nav class="sidebar">
  <div class="sidebar-logo">
    <h1>CoachHub</h1>
    <p>Career Coaching Platform</p>

</nav>

<!-- ── Main ──────────────────────────────────────────────────────────────── -->
<main class="main">

  <!-- DASHBOARD -->
  <section id="pg-dashboard" class="page active">
    <div class="page-header">
      <h2>Dashboard</h2>
      <p id="dash-date"></p>
    </div>
    <div class="g4 section-gap" id="dash-metrics"></div>
    <div class="g2 section-gap">
      <div class="card">
        <div class="card-title">Today's Sessions</div>
        <div id="dash-today"></div>
      </div>
      <div class="card">
        <div class="card-title">Open Action Items</div>
        <div id="dash-actions"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Pipeline Snapshot</div>
      <div id="dash-pipeline"></div>
    </div>
  </section>

  <!-- COACHEES -->
  <section id="pg-coachees" class="page">
    <div class="page-header">
      <h2>Coachees</h2>
      <p id="coachees-sub"></p>
    </div>
    <div class="search-bar">
      <input class="input" type="text" placeholder="Search by name or role…" id="srch" oninput="filterCoachees()" style="max-width:260px">
      <select class="input" id="flt" onchange="filterCoachees()" style="max-width:130px;width:auto">
        <option value="all">All Status</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
    </div>
    <div class="coachee-list" id="coachee-list"></div>
  </section>

  <!-- PROFILE -->
  <section id="pg-profile" class="page">
    <div class="back-btn" onclick="nav('coachees', document.querySelectorAll('.nav-item')[1])">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Coachees
    </div>
    <div id="profile-content"></div>
  </section>

  <!-- SESSIONS -->
  <section id="pg-sessions" class="page">
    <div class="page-header"><h2>Sessions</h2></div>
    <div class="week-nav">
      <button class="btn btn-ghost" onclick="shiftWeek(-1)">← Prev</button>
      <div class="week-label" id="week-label"></div>
      <button class="btn btn-ghost" onclick="shiftWeek(1)">Next →</button>
    </div>
    <div class="week-grid" id="week-grid"></div>
  </section>

  <!-- PIPELINE -->
  <section id="pg-pipeline" class="page">
    <div class="page-header">
      <h2>Pipeline</h2>
      <p>Drag cards between columns to update stage</p>
    </div>
    <div class="kanban" id="kanban"></div>
  </section>

</main>

// ─── Data access ──────────────────────────────────────────────────────────────
const get = k => JSON.parse(localStorage.getItem(k) || '[]');
const set = (k,v) => localStorage.setItem(k, JSON.stringify(v));

const getCoachees = () => get('cc_coachees');
const getSessions = () => get('cc_sessions');
const getActions  = () => get('cc_actions');
const getPipeline = () => get('cc_pipeline');

// ─── Helpers ──────────────────────────────────────────────────────────────────
const initials = name => name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();

function progressPct(cid) {
  const acts = getActions().filter(a => a.coacheeId === cid);
  return acts.length ? Math.round(acts.filter(a=>a.completed).length / acts.length * 100) : 0;
}

function sessionCount(cid) {
  return getSessions().filter(s => s.coacheeId === cid && s.date <= todayStr && s.notes).length;
}

function priorityBadge(p) {
  const cls = { high:'badge-red', medium:'badge-yellow', low:'badge-gray' };
  return `<span class="badge ${cls[p]}">${p}</span>`;
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function nav(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('pg-' + page).classList.add('active');
  if (el) el.classList.add('active');
  const renders = { dashboard:renderDash, coachees:renderCoachees, sessions:renderSessions, pipeline:renderPipeline };
  renders[page] && renders[page]();
}

function filterCoachees() {
  const q  = document.getElementById('srch').value.toLowerCase();
  const fl = document.getElementById('flt').value;
  const list = getCoachees().filter(c =>
    (c.name.toLowerCase().includes(q) || c.role.toLowerCase().includes(q)) &&
    (fl === 'all' || c.status === fl)
  );
  const el = document.getElementById('coachee-list');
  if (!list.length) { el.innerHTML = '<div class="empty">No coachees found</div>'; return; }

  el.innerHTML = list.map(c => {
    const pct      = progressPct(c.id);
    const sc       = sessionCount(c.id);
    const openActs = getActions().filter(a => a.coacheeId===c.id && !a.completed).length;
    return `<div class="coachee-card" onclick="openProfile('${c.id}')">
      <div class="avatar" style="background:${c.color};width:44px;height:44px;font-size:15px">${initials(c.name)}</div>
      <div style="flex:1">
        <div class="coachee-name">${c.name}</div>
        <div class="coachee-role">${c.role} → ${c.targetRole}</div>
        <div style="margin-top:6px;display:flex;gap:8px;align-items:center">
          <span class="badge ${c.status==='active'?'badge-green':'badge-gray'}">${c.status}</span>
          <span style="font-size:11px;color:var(--fg-muted)">${sc} sessions · ${openActs} open actions</span>
        </div>
      </div>
      <div class="coachee-prog">
        <div class="prog-label"><span>Actions</span><span>${pct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${c.color}"></div></div>
        <div style="font-size:11px;color:var(--fg-muted);margin-top:4px">Since ${fmtD(c.startDate)}</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--fg-muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`;
  }).join('');
}

// ─── Profile ──────────────────────────────────────────────────────────────────
function openProfile(id) {
  const c = getCoachees().find(x => x.id===id);
  if (!c) return;

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('pg-profile').classList.add('active');

  const sessions = getSessions().filter(s => s.coacheeId===id && s.notes).sort((a,b) => b.date.localeCompare(a.date));
  const actions  = getActions().filter(a => a.coacheeId===id);
  const pct      = progressPct(id);

  document.getElementById('profile-content').innerHTML = `
    <div class="profile-hdr">
      <div class="avatar" style="background:${c.color};width:70px;height:70px;font-size:24px">${initials(c.name)}</div>
      <div class="profile-meta">
        <h2>${c.name}</h2>
        <p>${c.role} → <strong>${c.targetRole}</strong></p>
        <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
          <span class="badge ${c.status==='active'?'badge-green':'badge-gray'}">${c.status}</span>
          <span style="font-size:12px;color:var(--fg-muted)">Coaching since ${fmtD(c.startDate)}</span>
        </div>
      </div>
    </div>

    <div class="g2 section-gap">
      <div class="card">
        <div class="card-title">Goals</div>
        ${c.goals.map(g => `<div class="goal-row"><div class="goal-dot"></div>${g}</div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title">Progress Overview</div>
        <div style="margin-bottom:14px">
          <div class="prog-label"><span>Actions completed</span><span>${pct}%</span></div>
          <div class="progress-bar" style="height:9px"><div class="progress-fill" style="width:${pct}%;background:${c.color}"></div></div>
        </div>
        <div style="display:flex;gap:20px">
          <div><div style="font-size:24px;font-weight:700">${sessionCount(id)}</div><div style="font-size:11px;color:var(--fg-muted)">Sessions</div></div>
          <div><div style="font-size:24px;font-weight:700">${actions.filter(a=>a.completed).length}</div><div style="font-size:11px;color:var(--fg-muted)">Done</div></div>
          <div><div style="font-size:24px;font-weight:700">${actions.filter(a=>!a.completed).length}</div><div style="font-size:11px;color:var(--fg-muted)">Open</div></div>
        </div>
      </div>
    </div>

    <div class="tab-bar">
      <div class="tab active" onclick="switchTab(this,'tab-ses')">Session History</div>
      <div class="tab" onclick="switchTab(this,'tab-act')">Action Items</div>
    </div>

    <div id="tab-ses" class="tab-panel active">
      <div class="card">
        ${sessions.length ? sessions.map(s => {
          const d = new Date(s.date);
          return `<div class="ses-row">
            <div class="ses-datebox">
              <div class="ses-month">${d.toLocaleDateString('en',{month:'short'})}</div>
              <div class="ses-day">${d.getDate()}</div>
            </div>
            <div class="ses-body">
              <div class="ses-dur">${s.duration} min session</div>
              <div class="ses-notes">${s.notes}</div>
              ${s.nextSteps ? `<div class="ses-next">→ ${s.nextSteps}</div>` : ''}
            </div>
          </div>`;
        }).join('') : '<div class="empty">No sessions recorded yet</div>'}
      </div>
    </div>

    <div id="tab-act" class="tab-panel">
      <div class="card">
        ${actions.length ? actions
          .sort((a,b) => a.completed - b.completed || a.dueDate.localeCompare(b.dueDate))
          .map(a => {
            const overdue = !a.completed && a.dueDate < todayStr;
            return `<div class="action-row">
              <div class="chk ${a.completed?'done':''}" onclick="toggleAction('${a.id}',this)"></div>
              <div class="action-title-text ${a.completed?'done':''}">${a.title}</div>
              <span style="font-size:11px;color:${overdue?'var(--danger)':'var(--fg-muted)'};margin-right:8px">
                ${overdue?'Overdue: ':'Due: '}${fmtD(a.dueDate)}
              </span>
              ${priorityBadge(a.priority)}
            </div>`;
          }).join('') : '<div class="empty">No action items yet</div>'}
      </div>
    </div>
  `;
}

function switchTab(el, targetId) {
  el.closest('.tab-bar').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(targetId).classList.add('active');
}

function toggleAction(id, el) {
  const actions = getActions();
  const a = actions.find(x => x.id===id);
  if (!a) return;
  a.completed = !a.completed;
  set('cc_actions', actions);
  el.classList.toggle('done', a.completed);
  el.nextElementSibling.classList.toggle('done', a.completed);
}

// ─── Sessions calendar ────────────────────────────────────────────────────────
let weekOffset = 0;

function getWeekDays(offset) {
  const d = new Date(today);
  const dow = d.getDay();
  const diff = d.getDate() - dow + (dow===0 ? -6 : 1); // Monday
  d.setDate(diff + offset*7);
  return Array.from({length:7}, (_,i) => { const x=new Date(d); x.setDate(d.getDate()+i); return x; });
}

function shiftWeek(dir) { weekOffset += dir; renderSessions(); }

function renderSessions() {
  const days = getWeekDays(weekOffset);
  const coacheeMap = Object.fromEntries(getCoachees().map(c => [c.id, c]));
  const sessions   = getSessions();

  document.getElementById('week-label').textContent =
    `${days[0].toLocaleDateString('en',{month:'short',day:'numeric'})} – ${days[6].toLocaleDateString('en',{month:'short',day:'numeric',year:'numeric'})}`;

  document.getElementById('week-grid').innerHTML = days.map(d => {
    const ds       = d.toISOString().slice(0,10);
    const isToday  = ds === todayStr;
    const daySes   = sessions.filter(s => s.date===ds).sort((a,b) => (a.time||'').localeCompare(b.time||''));
    return `<div class="day-col ${isToday?'today':''}">
      <div class="day-header">
        <div class="day-name">${DAY_NAMES[d.getDay()]}</div>
        <div class="day-num">${d.getDate()}</div>
      </div>
      ${daySes.map(s => {
        const c = coacheeMap[s.coacheeId];
        return `<div class="ses-chip" onclick="openProfile('${s.coacheeId}')">
          <div class="ses-time">${s.time||'—'}</div>
          <div class="ses-who">${c?.name?.split(' ')[0]||'?'}</div>
          <div style="font-size:10px;color:var(--fg-muted);margin-top:1px">${s.duration}min</div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

// ─── Pipeline kanban ──────────────────────────────────────────────────────────
function renderPipeline() {
  const pipeline = getPipeline();
  document.getElementById('kanban').innerHTML = STAGES.map(stage => {
    const leads = pipeline.filter(p => p.stage===stage);
    return `<div class="kanban-col">
      <div class="kanban-header">
        <span class="kanban-title" style="color:${STAGE_COLOR[stage]}">${STAGE_LABEL[stage]}</span>
        <span class="kanban-count">${leads.length}</span>
      </div>
      <div class="drop-zone" id="zone-${stage}"
        ondragover="onDragOver(event,this)"
        ondragleave="onDragLeave(this)"
        ondrop="onDrop(event,'${stage}')">
        ${leads.map(renderLeadCard).join('')}
      </div>
    </div>`;
  }).join('');
  attachDrag();
}

function renderLeadCard(lead) {
  return `<div class="lead-card" id="lc-${lead.id}" draggable="true" data-id="${lead.id}">
    <div class="lead-name">${lead.name}</div>
    <div class="lead-email">${lead.email}</div>
    ${lead.notes ? `<div class="lead-notes">${lead.notes}</div>` : ''}
  </div>`;
}

function attachDrag() {
  document.querySelectorAll('.lead-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', card.dataset.id);
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
    });
  });
}

function onDragOver(e, zone)  { e.preventDefault(); zone.classList.add('drag-over'); }
function onDragLeave(zone)    { zone.classList.remove('drag-over'); }

function onDrop(e, stage) {
  e.preventDefault();
  const id  = e.dataTransfer.getData('text/plain');
  const pip = getPipeline();
  const lead = pip.find(p => p.id===id);
  if (lead && lead.stage !== stage) { lead.stage = stage; set('cc_pipeline', pip); }
  renderPipeline();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function resetData() {
  if (confirm('Reset all data to defaults? This will clear any changes you\'ve made.')) {
    ['cc_coachees','cc_sessions','cc_actions','cc_pipeline'].forEach(k => localStorage.removeItem(k));
    seedData();
    nav('dashboard', document.querySelector('.nav-item'));
  }
}
if (!localStorage.getItem('cc_coachees')) seedData();
renderDash();
</script>
